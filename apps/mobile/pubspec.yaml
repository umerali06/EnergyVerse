name: fev_mobile
description: Flacron EnergyVerse Field App
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  dio: 5.7.0
  fev_api_client:
    path: ../../packages/contracts/generated/dart-dio
  shared_preferences: 2.3.2
  firebase_core: 4.12.1
  firebase_auth: 6.5.6
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  built_collection: ^5.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Variable.ttf
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
