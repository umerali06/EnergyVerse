name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint + type-check + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Mypy type-check
        run: poetry run mypy app scripts
      - name: Pytest
        run: poetry run pytest

  admin:
    name: Admin — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Bundle budget
        run: pnpm check-bundle

  mobile:
    name: Mobile — analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Unit and widget tests
        run: flutter test

  contracts:
    name: Contracts — generated-client drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned Poetry
        run: pip install poetry==2.4.1
      - name: Install API dependencies
        working-directory: apps/api
        run: poetry install --no-interaction
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17.0.16+8"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
      - name: Export OpenAPI
        working-directory: apps/api
        run: poetry run python -m scripts.export_openapi
      - name: Install pinned generator
        working-directory: packages/contracts
        run: pnpm install --frozen-lockfile
      - name: Regenerate clients
        working-directory: packages/contracts
        run: pnpm run generate
      - name: Fail on contract drift
        run: git diff --exit-code -- packages/contracts
